name: Verify min k8s version

on:
  pull_request:
    branches: [ 'main', 'release-*' ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify hardcoded k8s minimum version matches knative/pkg
        run: ./hack/verify-min-k8s-version.sh
